<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPU / GPU 天梯图 - 鲁大师 & Time Spy 跑分对比</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #c9d1d9;
  --text2: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --orange: #d2991d;
  --red: #f85149;
  --purple: #a371f7;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}

/* ===== TOP BAR ===== */
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; gap: 20px;
  position: sticky; top: 0; z-index: 100; flex-wrap: wrap;
}
.topbar h1 { font-size: 20px; font-weight: 700; white-space: nowrap; }
.topbar h1 span { color: var(--accent); }
.tab-group { display: flex; gap: 4px; background: var(--bg3); border-radius: 8px; padding: 3px; }
.tab-btn {
  padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; background: transparent; color: var(--text2);
  transition: all .15s; white-space: nowrap;
}
.tab-btn.active { background: var(--accent); color: #fff; }
.tab-btn:not(.active):hover { color: var(--text); }
.score-toggle { display: flex; gap: 4px; background: var(--bg3); border-radius: 8px; padding: 3px; margin-left: auto; }
.score-btn {
  padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; background: transparent; color: var(--text2);
  transition: all .15s; white-space: nowrap;
}
.score-btn.active { background: var(--green); color: #fff; }
.search-box {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 14px; color: var(--text); font-size: 13px; width: 220px; outline: none;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text2); }

/* ===== LAYOUT ===== */
.main-wrap { display: flex; height: calc(100vh - 64px); }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px; min-width: 240px; background: var(--bg2); border-right: 1px solid var(--border);
  padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px;
}
.filter-group label { font-size: 11px; font-weight: 700; color: var(--text2); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
.filter-group select {
  width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 10px; color: var(--text); font-size: 13px; outline: none;
}
.filter-group select:focus { border-color: var(--accent); }

/* ===== CHART AREA ===== */
.chart-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chart-header {
  padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2);
}
.chart-container { flex: 1; overflow-y: auto; padding: 16px; position: relative; }
.bar-list { display: flex; flex-direction: column; gap: 2px; }
.bar-row {
  display: flex; align-items: center; height: 36px; padding: 0 8px; border-radius: 4px;
  cursor: pointer; transition: background .1s; position: relative; gap: 8px;
}
.bar-row:hover { background: var(--bg3); }
.bar-row.selected { background: rgba(88,166,255,.15); outline: 1px solid var(--accent); }
.bar-rank { width: 32px; text-align: right; font-size: 11px; color: var(--text2); font-weight: 700; flex-shrink: 0; }
.bar-name { width: 160px; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.bar-name .tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: 1px; }
.tag-laptop { background: rgba(163,113,247,.2); color: var(--purple); }
.tag-server { background: rgba(210,153,29,.2); color: var(--orange); }
.tag-desktop { display: none; }
.bar-bg { flex: 1; height: 22px; background: var(--bg3); border-radius: 4px; position: relative; overflow: hidden; min-width: 60px; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .3s; opacity: .85; }
.bar-fill.intel { background: linear-gradient(90deg, #0071c5, #00aaff); }
.bar-fill.amd { background: linear-gradient(90deg, #ed1c24, #f47b20); }
.bar-fill.nvidia { background: linear-gradient(90deg, #76b900, #a4d420); }
.bar-score { width: 72px; text-align: right; font-size: 11px; font-weight: 700; color: var(--text); flex-shrink: 0; }
.bar-value { display: flex; align-items: center; gap: 4px; width: 90px; flex-shrink: 0; }
.value-stars { color: var(--orange); font-size: 11px; white-space: nowrap; }
.value-price { font-size: 10px; color: var(--text2); }

/* ===== DETAIL PANEL ===== */
.detail-panel {
  width: 320px; min-width: 320px; background: var(--bg2); border-left: 1px solid var(--border);
  padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
}
.detail-panel h3 { font-size: 16px; }
.detail-panel .subtitle { font-size: 12px; color: var(--text2); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.detail-item { background: var(--bg3); border-radius: 6px; padding: 10px; }
.detail-item .label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
.detail-item .val { font-size: 14px; font-weight: 700; margin-top: 2px; }
.detail-scores { display: flex; gap: 8px; }
.detail-scores .score-card {
  flex: 1; background: var(--bg3); border-radius: 8px; padding: 12px; text-align: center;
}
.score-card .sc { font-size: 22px; font-weight: 800; }
.score-card .scl { font-size: 10px; color: var(--text2); }
.score-card .scl2 { font-size: 14px; font-weight: 700; color: var(--orange); margin-top: 4px; }

/* ===== COMPARE MODE ===== */
.compare-bar {
  position: sticky; bottom: 0; background: var(--bg2); border-top: 1px solid var(--border);
  padding: 10px 20px; display: flex; align-items: center; gap: 12px; z-index: 50;
}
.compare-slots { display: flex; gap: 8px; flex: 1; }
.compare-slot {
  flex: 1; max-width: 200px; background: var(--bg3); border: 1px dashed var(--border);
  border-radius: 6px; padding: 8px 12px; font-size: 12px; min-height: 40px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  color: var(--text2); transition: all .15s; text-align: center;
}
.compare-slot.filled { border-style: solid; border-color: var(--accent); color: var(--text); font-weight: 600; }
.compare-btn {
  padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; background: var(--accent); color: #fff;
  white-space: nowrap;
}
.compare-btn:disabled { opacity: .4; cursor: not-allowed; }
.compare-clear { background: transparent; color: var(--text2); border: 1px solid var(--border); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; max-width: 900px; width: 95%; max-height: 80vh; overflow-y: auto;
}
.modal h2 { margin-bottom: 16px; }
.modal table { width: 100%; border-collapse: collapse; font-size: 13px; }
.modal th { background: var(--bg3); padding: 10px 12px; text-align: left; font-size: 11px; color: var(--text2); }
.modal td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.modal .best { color: var(--green); font-weight: 700; }
.modal-close {
  position: absolute; top: 16px; right: 16px; background: none; border: none;
  color: var(--text2); font-size: 22px; cursor: pointer;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* ===== CHEVRON ===== */
.rank-up { color: var(--green); }
.rank-down { color: var(--red); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1>硬件<span>天梯图</span></h1>
  <div class="tab-group" id="tabGroup">
    <button class="tab-btn active" data-tab="cpu">CPU</button>
    <button class="tab-btn" data-tab="gpu">GPU</button>
  </div>
  <div class="score-toggle" id="scoreToggle">
    <button class="score-btn active" data-score="ludashi">鲁大师</button>
    <button class="score-btn" data-score="timespy">Time Spy</button>
  </div>
  <input type="text" class="search-box" id="searchBox" placeholder="搜索型号... (如 E3-1230, i7-13700K)">
</div>

<!-- MAIN -->
<div class="main-wrap">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="filter-group">
    <label>平台 / 代际</label>
    <select id="filterPlatform"><option value="all">全部</option></select>
  </div>
  <div class="filter-group">
    <label>品牌</label>
    <select id="filterBrand">
      <option value="all">全部</option>
      <option value="Intel">Intel</option>
      <option value="AMD">AMD</option>
      <option value="NVIDIA">NVIDIA</option>
      <option value="Intel Arc">Intel Arc</option>
    </select>
  </div>
  <div class="filter-group">
    <label>类型</label>
    <select id="filterType">
      <option value="all">全部</option>
      <option value="desktop">桌面</option>
      <option value="laptop">笔记本</option>
      <option value="server">服务器</option>
    </select>
  </div>
  <div class="filter-group">
    <label>性价比 ★</label>
    <select id="filterValue">
      <option value="0">全部</option>
      <option value="7">≥ 7 分（高性价比）</option>
      <option value="8">≥ 8 分（超值）</option>

  </div>
</div>

<!-- CHART -->
<div class="chart-area">
  <div class="chart-header" id="chartHeader">
    <span id="resultCount">共 0 个型号</span>
    <span id="sortInfo">按跑分降序排列</span>
  </div>
  <div class="chart-container" id="chartContainer">
    <div id="barList" class="bar-list"></div>
  </div>
</div>

<!-- DETAIL -->
<div class="detail-panel" id="detailPanel">
  <div style="text-align:center;color:var(--text2);margin-top:80px;font-size:13px;">
    ← 点击左侧硬件查看详情<br><br>
    可多选加入底部对比栏
  </div>
</div>

</div><!-- /main-wrap -->

<!-- COMPARE BAR -->
<div class="compare-bar" id="compareBar">
  <span style="font-size:12px;color:var(--text2);white-space:nowrap;">对比栏</span>
  <div class="compare-slots" id="compareSlots">
    <div class="compare-slot" data-slot="0">点击硬件加入对比</div>
    <div class="compare-slot" data-slot="1">点击硬件加入对比</div>
    <div class="compare-slot" data-slot="2">点击硬件加入对比</div>
    <div class="compare-slot" data-slot="3">点击硬件加入对比</div>
  </div>
  <button class="compare-btn" id="compareBtn" disabled>开始对比</button>
  <button class="compare-btn compare-clear" id="compareClear">清空</button>
</div>

<!-- COMPARE MODAL -->
<div class="modal-overlay" id="compareModal" style="display:none;">
  <div style="position:relative;">
    <div class="modal" id="compareContent"></div>
  </div>
</div>

// ================================
// APP STATE
// ================================
let currentTab = 'cpu';
let currentScore = 'ludashi';
let selectedItem = null;
let compareSlots = [null, null, null, null];

// ================================
// HELPERS
// ================================
function getData() { return currentTab === 'cpu' ? CPU_DATA : GPU_DATA; }
function getScore(item) { return currentScore === 'ludashi' ? item.ludashi : item.timespy; }
function fmtScore(v) {
  if (!v) return 'N/A';
  if (currentScore === 'ludashi') return (v/10000).toFixed(1) + '万';
  return v.toLocaleString();
}
function fmtScoreRaw(v) { return v ? v.toLocaleString() : 'N/A'; }

function getPlatforms() {
  const data = getData();
  const platforms = [...new Set(data.map(d => d.platform))].sort();
  return platforms;
}

function getBarClass(item) {
  if (item.brand === 'Intel') return 'intel';
  if (item.brand === 'AMD') return 'amd';
  if (item.brand === 'NVIDIA') return 'nvidia';
  if (item.brand === 'Intel Arc') return 'intel';
  return '';
}

function getTag(item) {
  if (item.type === 'laptop') return '<span class="tag tag-laptop">笔记本</span>';
  if (item.type === 'server') return '<span class="tag tag-server">服务器</span>';
  return '';
}

function getStars(v) {
  if (!v || v === 0) return '';
  let s = '';
  for (let i = 0; i < Math.round(v); i++) s += '★';
  for (let i = Math.round(v); i < 10; i++) s += '☆';
  return s;
}

// ================================
// RENDER
// ================================
function getFilteredData() {
  const data = getData();
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  const platform = document.getElementById('filterPlatform').value;
  const brand = document.getElementById('filterBrand').value;
  const type = document.getElementById('filterType').value;
  const minValue = parseInt(document.getElementById('filterValue').value);

  let filtered = data.filter(item => {
    if (search && !item.name.toLowerCase().includes(search)) return false;
    if (platform !== 'all' && item.platform !== platform) return false;
    if (brand !== 'all' && item.brand !== brand) return false;
    if (type !== 'all' && item.type !== type) return false;
    if (minValue > 0 && (item.value || 0) < minValue) return false;
    return true;
  });

  // Sort by current score descending
  filtered.sort((a, b) => {
    const sa = getScore(a) || 0;
    const sb = getScore(b) || 0;
    return sb - sa;
  });

  return filtered;
}

function renderBars() {
  const filtered = getFilteredData();
  const maxScore = filtered.length > 0 ? Math.max(...filtered.map(d => getScore(d) || 0)) : 1;

  document.getElementById('resultCount').textContent = `共 ${filtered.length} 个型号`;
  document.getElementById('chartHeader').querySelector('span:last-child').textContent =
    currentScore === 'ludashi' ? '按新版鲁大师跑分降序' : '按 Time Spy 跑分降序';

  const barList = document.getElementById('barList');

  if (filtered.length === 0) {
    barList.innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px;">没有匹配的硬件，换一个筛选条件试试</div>';
    return;
  }

  barList.innerHTML = filtered.map((item, i) => {
    const score = getScore(item) || 0;
    const width = (score / maxScore * 100).toFixed(1);
    const cls = getBarClass(item);
    const tag = getTag(item);
    const stars = getStars(item.value);
    const price = item.uPrice ? '¥' + item.uPrice : '新品';

    return `
    <div class="bar-row" data-id="${item.id}" data-tab="${currentTab}" onclick="selectItem('${item.id}')" oncontextmenu="event.preventDefault();toggleCompare('${item.id}')">
      <span class="bar-rank">${i + 1}</span>
      <span class="bar-name">${item.name}${tag}</span>
      <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${width}%"></div></div>
      <span class="bar-score">${fmtScore(score)}</span>
      <div class="bar-value">
        <span class="value-stars">${stars}</span>
        <span class="value-price">${price}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('resultCount').textContent = `共 ${filtered.length} 个型号`;
}

function selectItem(id) {
  const data = getData();
  const item = data.find(d => d.id === id);
  if (!item) return;

  selectedItem = item;
  selectedItem._tab = currentTab;

  // Highlight
  document.querySelectorAll('.bar-row').forEach(el => el.classList.remove('selected'));
  const row = document.querySelector(`[data-id="${id}"]`);
  if (row) row.classList.add('selected');

  renderDetail(item);
}

function renderDetail(item) {
  const panel = document.getElementById('detailPanel');
  const score = getScore(item);
  const stars = getStars(item.value);
  const isCpu = currentTab === 'cpu';

  let specGrid = '';
  if (isCpu) {
    specGrid = `
    <div class="detail-item"><div class="label">核心/线程</div><div class="val">${item.cores}C/${item.threads}T</div></div>
    <div class="detail-item"><div class="label">基础频率</div><div class="val">${item.bClock} GHz</div></div>
    <div class="detail-item"><div class="label">最大睿频</div><div class="val">${item.bBoost || 'N/A'}${item.bBoost?' GHz':''}</div></div>
    <div class="detail-item"><div class="label">缓存</div><div class="val">${item.cache}</div></div>
    <div class="detail-item"><div class="label">TDP</div><div class="val">${item.tdp}W</div></div>
    <div class="detail-item"><div class="label">内存</div><div class="val">${item.ram}</div></div>

    <div class="detail-item"><div class="label">显存</div><div class="val">${item.vram}</div></div>
    <div class="detail-item"><div class="label">架构</div><div class="val">${item.arch}</div></div>
    <div class="detail-item"><div class="label">流处理器</div><div class="val">${item.cores.toLocaleString()}</div></div>
    <div class="detail-item"><div class="label">基础频率</div><div class="val">${item.bClock} MHz</div></div>
    <div class="detail-item"><div class="label">加速频率</div><div class="val">${item.bBoost || 'N/A'}${item.bBoost?' MHz':''}</div></div>
    <div class="detail-item"><div class="label">位宽</div><div class="val">${item.bus}</div></div>
    <div class="detail-item"><div class="label">TDP</div><div class="val">${item.tdp}W</div></div>
    <div class="detail-item"><div class="label">发售年</div><div class="val">${item.year}</div></div>
    `;

  <h3>${item.name}</h3>

  <div class="detail-scores">
    <div class="score-card">
      <div class="sc">${fmtScore(item.ludashi)}</div>
      <div class="scl">鲁大师 (新版)</div>
    </div>
    <div class="score-card">
      <div class="sc">${item.timespy ? item.timespy.toLocaleString() : 'N/A'}</div>
      <div class="scl">Time Spy ${isCpu ? 'CPU' : 'Graphics'}</div>
    </div>
  </div>

  <div class="detail-scores">
    <div class="score-card">
      <div class="scl2">${stars}</div>
      <div class="scl">性价比</div>
    </div>
    <div class="score-card">
      <div class="scl2">${item.uPrice ? '¥' + item.uPrice : '新品'}</div>
      <div class="scl">参考二手价</div>
    </div>
  </div>

  <div class="detail-grid">${specGrid}</div>

  <button onclick="toggleCompare('${item.id}')" style="width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;font-size:13px;font-weight:600;">
    ${compareSlots.includes(item.id) ? '✓ 已加入对比栏 (点击移除)' : '+ 加入对比栏'}
  </button>
  `;
}

// ================================
// COMPARE
// ================================
function toggleCompare(id) {
  const data = getData();
  const item = data.find(d => d.id === id);
  if (!item) return;

  const idx = compareSlots.indexOf(id);
  if (idx >= 0) {
    compareSlots[idx] = null;
  } else {
    const emptyIdx = compareSlots.indexOf(null);
    if (emptyIdx >= 0) {
      compareSlots[emptyIdx] = id;
    } else {
      alert('对比栏已满（最多4个），请先移除一个');
      return;
    }
  }
  renderCompareBar();
  renderBars();
  if (selectedItem && selectedItem.id === id) renderDetail(selectedItem);
}

function renderCompareBar() {
  const slots = document.querySelectorAll('.compare-slot');
  slots.forEach((slot, i) => {
    const id = compareSlots[i];
    if (id) {
      // Find in both datasets
      let item = CPU_DATA.find(d => d.id === id) || GPU_DATA.find(d => d.id === id);
      if (item) {
        slot.textContent = item.name;
        slot.classList.add('filled');
      }
    } else {
      slot.textContent = '点击硬件加入对比';
      slot.classList.remove('filled');
    }
  });

  const filledCount = compareSlots.filter(s => s !== null).length;
  document.getElementById('compareBtn').disabled = filledCount < 2;
}

function openCompare() {
  const filled = compareSlots.filter(s => s !== null);
  if (filled.length < 2) return;

  const allData = [...CPU_DATA, ...GPU_DATA];
  const items = filled.map(id => allData.find(d => d.id === id)).filter(Boolean);
  const isCpu = items.every(i => 'cores' in i);

  let html = '<h2>硬件对比</h2><table><thead><tr><th>参数</th>';
  items.forEach(i => { html += `<th>${i.name}</th>`; });
  html += '</tr></thead><tbody>';

  // Score rows
  html += '<tr><td>鲁大师 (新版)</td>';
  const luScores = items.map(i => i.ludashi || 0);
  const luMax = Math.max(...luScores);
  items.forEach((i, idx) => { html += `<td class="${i.ludashi===luMax?'best':''}">${fmtScore(i.ludashi)}</td>`; });
  html += '</tr>';

  html += '<tr><td>Time Spy</td>';
  const tsScores = items.map(i => i.timespy || 0);
  const tsMax = Math.max(...tsScores);
  items.forEach((i, idx) => { html += `<td class="${i.timespy===tsMax?'best':''}">${i.timespy?i.timespy.toLocaleString():'N/A'}</td>`; });
  html += '</tr>';

  html += '<tr><td>性价比</td>';
  items.forEach(i => { html += `<td>${getStars(i.value)}</td>`; });
  html += '</tr>';

  html += '<tr><td>参考二手价</td>';
  items.forEach(i => { html += `<td>${i.uPrice?'¥'+i.uPrice:'新品'}</td>`; });
  html += '</tr>';

  if (isCpu) {
    html += '<tr><td>核心/线程</td>';
    items.forEach(i => { html += `<td>${i.cores}C/${i.threads}T</td>`; });
    html += '</tr><tr><td>基础频率</td>';
    items.forEach(i => { html += `<td>${i.bClock} GHz</td>`; });
    html += '</tr><tr><td>最大睿频</td>';
    items.forEach(i => { html += `<td>${i.bBoost?i.bBoost+' GHz':'N/A'}</td>`; });
    html += '</tr><tr><td>缓存</td>';
    items.forEach(i => { html += `<td>${i.cache}</td>`; });
    html += '</tr><tr><td>TDP</td>';
    items.forEach(i => { html += `<td>${i.tdp}W</td>`; });
    html += '</tr><tr><td>平台</td>';
    items.forEach(i => { html += `<td>${i.platform}</td>`; });
    html += '</tr><tr><td>代际</td>';
    items.forEach(i => { html += `<td>${i.gen}</td>`; });
    html += '</tr><tr><td>内存</td>';
    items.forEach(i => { html += `<td>${i.ram}</td>`; });
    html += '</tr>';
  } else {
    html += '<tr><td>显存</td>';
    items.forEach(i => { html += `<td>${i.vram}</td>`; });
    html += '</tr><tr><td>架构</td>';
    items.forEach(i => { html += `<td>${i.arch}</td>`; });
    html += '</tr><tr><td>流处理器</td>';
    items.forEach(i => { html += `<td>${i.cores.toLocaleString()}</td>`; });
    html += '</tr><tr><td>频率</td>';
    items.forEach(i => { html += `<td>${i.bClock}${i.bBoost?'/'+i.bBoost:''} MHz</td>`; });
    html += '</tr><tr><td>位宽</td>';
    items.forEach(i => { html += `<td>${i.bus}</td>`; });
    html += '</tr><tr><td>TDP</td>';
    items.forEach(i => { html += `<td>${i.tdp}W</td>`; });
    html += '</tr>';
  }

  html += '</tbody></table>';
  document.getElementById('compareContent').innerHTML = html;
  document.getElementById('compareModal').style.display = 'flex';
}

function clearCompare() {
  compareSlots = [null, null, null, null];
  renderCompareBar();
  renderBars();
}

// ================================
// INIT
// ================================
function initPlatforms() {
  const sel = document.getElementById('filterPlatform');
  const platforms = getPlatforms();
  sel.innerHTML = '<option value="all">全部</option>' +
    platforms.map(p => `<option value="${p}">${p}</option>`).join('');
}

function switchTab(tab) {
  currentTab = tab;
  initPlatforms();
  renderBars();
  selectedItem = null;
  document.getElementById('detailPanel').innerHTML =
    '<div style="text-align:center;color:var(--text2);margin-top:80px;font-size:13px;">← 点击左侧硬件查看详情<br><br>可多选加入底部对比栏</div>';

  // Update brand filter for GPU
  const brandSel = document.getElementById('filterBrand');
  if (tab === 'cpu') {
    brandSel.innerHTML = '<option value="all">全部</option><option value="Intel">Intel</option><option value="AMD">AMD</option>';
    document.getElementById('filterType').innerHTML = '<option value="all">全部</option><option value="desktop">桌面</option><option value="laptop">笔记本</option><option value="server">服务器</option>';
  } else {
    brandSel.innerHTML = '<option value="all">全部</option><option value="NVIDIA">NVIDIA</option><option value="AMD">AMD</option><option value="Intel Arc">Intel Arc</option>';
    document.getElementById('filterType').innerHTML = '<option value="all">全部</option><option value="desktop">桌面</option><option value="laptop">笔记本</option>';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initPlatforms();

  // Tab switching
  document.querySelectorAll('#tabGroup .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#tabGroup .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      switchTab(btn.dataset.tab);
    });
  });

  // Score toggle
  document.querySelectorAll('#scoreToggle .score-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#scoreToggle .score-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentScore = btn.dataset.score;
      renderBars();
      if (selectedItem) {
        const data = getData();
        const item = data.find(d => d.id === selectedItem.id);
        if (item) renderDetail(item);
        else { selectedItem = null; document.getElementById('detailPanel').innerHTML = '<div style="text-align:center;color:var(--text2);margin-top:80px;">请重新选择</div>'; }
      }
    });
  });

  // Search
  document.getElementById('searchBox').addEventListener('input', renderBars);

  // Filters
  document.getElementById('filterPlatform').addEventListener('change', renderBars);
  document.getElementById('filterBrand').addEventListener('change', renderBars);
  document.getElementById('filterType').addEventListener('change', renderBars);
  document.getElementById('filterValue').addEventListener('change', renderBars);

  // Compare
  document.getElementById('compareBtn').addEventListener('click', openCompare);
  document.getElementById('compareClear').addEventListener('click', clearCompare);
  document.getElementById('compareModal').addEventListener('click', function(e) {
    if (e.target === this) this.style.display = 'none';
  });
  document.querySelectorAll('.compare-slot').forEach((slot, i) => {
    slot.addEventListener('click', () => {
      if (compareSlots[i]) {
        compareSlots[i] = null;
        renderCompareBar();
        renderBars();
      }
    });
  });

  // Initial render
  renderBars();
});
