<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPU / GPU 天梯图 - 鲁大师 & Time Spy & Cinebench R23 跑分对比</title>
<style>
:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --border:#30363d;
  --text:#e6edf3; --text2:#8b949e; --text3:#6e7681;
  --accent:#58a6ff; --green:#3fb950; --orange:#d2991d; --red:#f85149;
  --tier-s:#e8b830; --tier-a:#e04060; --tier-b:#9b59b6; --tier-c:#3498db; --tier-d:#7f8c8d;
  --intel:#0071c5; --amd:#ed1c24; --nvidia:#76b900; --arc:#00aaff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg); color:var(--text); overflow:hidden; height:100vh;
}

/* ===== TOP BAR ===== */
.topbar {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:10px 20px; display:flex; align-items:center; gap:16px;
  height:56px; flex-shrink:0;
}
.logo { font-size:18px; font-weight:800; white-space:nowrap; }
.logo span { color:var(--accent); }
.logo .ver { font-size:10px; color:var(--text3); font-weight:400; }

.tab-group, .score-toggle, .sort-group {
  display:flex; gap:2px; background:var(--bg3); border-radius:7px; padding:2px;
}
.tab-btn, .score-btn, .sort-btn {
  padding:6px 13px; border-radius:5px; border:none; cursor:pointer;
  font-size:12px; font-weight:600; background:transparent; color:var(--text2);
  transition:all .12s; white-space:nowrap;
}
.tab-btn.active,.score-btn.active,.sort-btn.active { background:var(--accent); color:#fff; }
.tab-btn:not(.active):hover,.score-btn:not(.active):hover,.sort-btn:not(.active):hover { color:var(--text); }

.spacer { flex:1; }

.search-box {
  background:var(--bg3); border:1px solid var(--border); border-radius:7px;
  padding:6px 12px; color:var(--text); font-size:12px; width:200px; outline:none;
}
.search-box:focus { border-color:var(--accent); }
.search-box::placeholder { color:var(--text3); }

/* ===== MAIN ===== */
.main-wrap { display:flex; height:calc(100vh - 56px - 52px); }

/* ===== SIDEBAR ===== */
.sidebar {
  width:230px; min-width:230px; background:var(--bg2); border-right:1px solid var(--border);
  padding:14px; overflow-y:auto; display:flex; flex-direction:column; gap:12px;
}
.filter-group label {
  font-size:10px; font-weight:700; color:var(--text3); display:block; margin-bottom:4px;
  text-transform:uppercase; letter-spacing:.8px;
}
.filter-group select {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:6px;
  padding:6px 8px; color:var(--text); font-size:12px; outline:none; cursor:pointer;
}
.filter-group select:focus { border-color:var(--accent); }

.tier-legend { margin-top:8px; border-top:1px solid var(--border); padding-top:10px; }
.tier-legend .trow { display:flex; align-items:center; gap:6px; font-size:11px; margin-bottom:4px; color:var(--text2); }
.tier-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.tier-s { background:var(--tier-s); }
.tier-a { background:var(--tier-a); }
.tier-b { background:var(--tier-b); }
.tier-c { background:var(--tier-c); }
.tier-d { background:var(--tier-d); }

/* ===== CHART ===== */
.chart-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chart-header {
  padding:8px 16px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border); font-size:12px; color:var(--text2); height:36px;
}
.chart-scroll { flex:1; overflow-y:auto; overflow-x:hidden; }

.bar-row {
  display:flex; align-items:center; height:34px; padding:0 10px; cursor:pointer;
  transition:background .08s; position:relative; gap:8px; border-bottom:1px solid rgba(48,54,61,.4);
}
.bar-row:hover { background:var(--bg3); }
.bar-row.selected { background:rgba(88,166,255,.12); outline:1px solid rgba(88,166,255,.3); outline-offset:-1px; }
.bar-rank { width:30px; text-align:right; font-size:10px; color:var(--text3); font-weight:700; flex-shrink:0; }
.bar-tier {
  width:20px; height:16px; border-radius:3px; font-size:9px; font-weight:800; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; color:#000;
}
.tier-S { background:var(--tier-s); }
.tier-A { background:var(--tier-a); color:#fff; }
.tier-B { background:var(--tier-b); color:#fff; }
.tier-C { background:var(--tier-c); color:#fff; }
.tier-D { background:var(--tier-d); color:#fff; }

.bar-name { width:165px; font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
.tag { font-size:9px; padding:1px 5px; border-radius:3px; margin-left:4px; vertical-align:1px; }
.tag-lp { background:rgba(163,113,247,.2); color:#a371f7; }
.tag-sv { background:rgba(210,153,29,.2); color:#d2991d; }
.tag-oc { background:rgba(255,140,0,.2); color:#ff8c00; }
.bar-fill-area { flex:1; height:20px; position:relative; min-width:40px; }
.bar-bg { position:absolute; inset:0; background:var(--bg3); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width .35s; }
.bar-fill.intel { background:linear-gradient(90deg,#0071c5,#00aaff); }
.bar-fill.amd { background:linear-gradient(90deg,#ed1c24,#f47b20); }
.bar-fill.nvidia { background:linear-gradient(90deg,#76b900,#a4d420); }
.bar-fill.arc { background:linear-gradient(90deg,#00aaff,#58a6ff); }
.bar-fill-val {
  position:absolute; right:4px; top:50%; transform:translateY(-50%);
  font-size:10px; font-weight:700; color:#fff; text-shadow:0 0 4px rgba(0,0,0,.6);
}
.bar-score { width:68px; text-align:right; font-size:11px; font-weight:700; flex-shrink:0; }
.bar-extra { width:150px; display:flex; align-items:center; gap:6px; font-size:10px; color:var(--text2); flex-shrink:0; }
.bar-extra .stars { color:var(--orange); white-space:nowrap; }
.bar-extra .prices { display:flex; gap:4px; align-items:center; }
.price-launch { color:var(--text3); }
.price-retail { color:var(--text2); font-weight:600; }

/* ===== DETAIL PANEL ===== */
.detail-panel {
  width:330px; min-width:330px; background:var(--bg2); border-left:1px solid var(--border);
  padding:14px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;
}
.detail-empty { text-align:center; color:var(--text3); margin-top:80px; font-size:12px; }
.detail-panel h3 { font-size:15px; line-height:1.3; }
.detail-panel .subtitle { font-size:11px; color:var(--text2); }
.score-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.score-card {
  background:var(--bg3); border-radius:8px; padding:10px; text-align:center;
}
.score-card .sv { font-size:20px; font-weight:800; }
.score-card .sv.red { color:var(--red); }
.score-card .sv.green { color:var(--green); }
.score-card .sl { font-size:10px; color:var(--text3); margin-top:2px; }
.price-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.price-card {
  background:var(--bg3); border-radius:8px; padding:10px; text-align:center;
}
.price-card .pv { font-size:17px; font-weight:700; }
.price-card .pl { font-size:10px; color:var(--text3); margin-top:2px; }
.spec-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
.spec-item { background:var(--bg3); border-radius:5px; padding:7px 9px; }
.spec-item .sl2 { font-size:9px; color:var(--text3); text-transform:uppercase; }
.spec-item .sv2 { font-size:13px; font-weight:700; margin-top:1px; }
.btn-add-compare {
  width:100%; padding:9px; margin-top:4px; border-radius:6px;
  border:1px solid var(--accent); background:transparent; color:var(--accent);
  cursor:pointer; font-size:12px; font-weight:600; transition:all .12s;
}
.btn-add-compare:hover { background:rgba(88,166,255,.1); }
.btn-add-compare.added { background:var(--accent); color:#fff; }

/* ===== COMPARE BAR ===== */
.compare-bar {
  height:52px; background:var(--bg2); border-top:1px solid var(--border);
  padding:0 16px; display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.compare-bar .cl { font-size:11px; color:var(--text2); white-space:nowrap; font-weight:700; }
.compare-slots { display:flex; gap:8px; flex:1; }
.compare-slot {
  flex:1; max-width:180px; background:var(--bg3); border:1px dashed var(--border);
  border-radius:6px; padding:7px 10px; font-size:11px; min-height:32px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  color:var(--text3); transition:all .12s; text-align:center;
}
.compare-slot.filled { border-style:solid; border-color:var(--accent); color:var(--text); font-weight:600; }
.compare-slot.filled:hover { background:rgba(88,166,255,.1); }
.btn-compare {
  padding:7px 16px; border-radius:6px; border:none; cursor:pointer;
  font-size:12px; font-weight:600; white-space:nowrap;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:disabled { opacity:.3; cursor:not-allowed; }
.btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }

/* ===== MODAL ===== */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200;
  display:flex; align-items:center; justify-content:center;
}
.modal {
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  padding:20px 24px; max-width:960px; width:95%; max-height:80vh; overflow-y:auto;
  position:relative;
}
.modal h2 { font-size:18px; margin-bottom:14px; }
.modal table { width:100%; border-collapse:collapse; font-size:12px; }
.modal th { background:var(--bg3); padding:8px 10px; text-align:left; font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; }
.modal td { padding:8px 10px; border-bottom:1px solid var(--border); }
.modal .best { color:var(--green); font-weight:700; }
.modal .worst { color:var(--red); }
.modal .tie { color:var(--orange); }
.modal-close {
  position:sticky; top:0; float:right; background:var(--bg3); border:none;
  color:var(--text2); font-size:20px; cursor:pointer; width:32px; height:32px;
  border-radius:6px; display:flex; align-items:center; justify-content:center;
  margin:-8px -12px 8px 8px; z-index:1;
}
.modal-close:hover { color:var(--text); background:var(--border); }

/* ===== SCROLL ===== */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text3); }
</style>
</head>

<div class="chart-area">

<!-- COMPARE MODAL -->
<div class="modal-overlay" id="compareModal" style="display:none;">

// APP

let currentTab='cpu', currentScore='ludashi', currentSort='score', selectedItem=null;
let compareSlots=[null,null,null,null];

function getData(){ return currentTab==='cpu'?CPU_DATA:GPU_DATA; }
function getScore(i){ if(currentScore==='ludashi')return i.ludashi; if(currentScore==='r23')return i.r23; return i.timespy; }
function fmtScore(v){ if(!v)return'N/A'; if(currentScore==='ludashi')return (v/10000).toFixed(1)+'万'; if(currentScore==='r23')return v.toLocaleString()+' 分'; return v.toLocaleString(); }

function getTier(i, total, maxScore){
  if(!maxScore||!getScore(i))return'D';
  const ratio=getScore(i)/maxScore;
  if(ratio>=0.85)return'S';
  if(ratio>=0.65)return'A';
  if(ratio>=0.35)return'B';
  if(ratio>=0.15)return'C';
  return'D';
}

function getBarClass(i){
  if(i.brand==='Intel')return'intel';
  if(i.brand==='AMD')return'amd';
  if(i.brand==='NVIDIA')return'nvidia';
  if(i.brand==='Intel Arc')return'arc';
  return'';
}

function getTag(i){
  if(i.tags)return'<span class="tag tag-oc">🔥 '+i.tags+'</span>';
  if(i.type==='laptop')return'<span class="tag tag-lp">笔记本</span>';
  if(i.type==='server')return'<span class="tag tag-sv">服务器</span>';
  return'';
}

function stars(v){ if(!v)return''; let s='';for(let i=0;i<Math.round(v);i++)s+='★'; return s; }

function priceStr(p){ return p?'¥'+p.toLocaleString():'N/A'; }

function getFiltered(){
  const data=getData();
  const s=document.getElementById('searchBox').value.toLowerCase().trim();
  const pf=document.getElementById('filterPlatform').value;
  const br=document.getElementById('filterBrand').value;
  const tp=document.getElementById('filterType').value;
  const mv=parseInt(document.getElementById('filterValue').value);

  let filtered=data.filter(i=>{
    if(s&&!i.name.toLowerCase().includes(s))return false;
    if(pf!=='all'&&i.platform!==pf)return false;
    if(br!=='all'&&i.brand!==br)return false;
    if(tp!=='all'&&i.type!==tp)return false;
    if(mv>0&&(i.value||0)<mv)return false;
    return true;
  });

  if(currentSort==='value'){
    filtered.sort((a,b)=>(b.value||0)-(a.value||0));
  }else if(currentSort==='year'){
    filtered.sort((a,b)=>(b.year||0)-(a.year||0));
  }else{
    filtered.sort((a,b)=>(getScore(b)||0)-(getScore(a)||0));
  }
  return filtered;
}

function renderBars(){
  const filtered=getFiltered();
  const scores=filtered.filter(i=>getScore(i)).map(i=>getScore(i));
  const maxScore=Math.max(...scores,1);

  document.getElementById('resultCount').textContent=filtered.length+' 个';

  const container=document.getElementById('barList');
  if(!filtered.length){
    container.innerHTML='<div style="text-align:center;color:var(--text3);padding:48px;font-size:13px;">没有匹配的硬件</div>';
    return;
  }

  container.innerHTML=filtered.map((i,idx)=>{
    const sc=getScore(i)||0;
    const w=sc/maxScore*100;
    const tier=getTier(i,filtered.length,maxScore);
    const cls=getBarClass(i);
    const tag=getTag(i);
    const st=stars(i.value);

    return `<div class="bar-row" data-id="${i.id}" onclick="selectItem('${i.id}')" oncontextmenu="event.preventDefault();toggleCompare('${i.id}');return false">
      <span class="bar-rank">${idx+1}</span>
      <span class="bar-tier tier-${tier}">${tier}</span>
      <span class="bar-name">${i.name}${tag}</span>
      <div class="bar-fill-area">
        <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${Math.max(w,0.5)}%"></div></div>
      </div>
      <span class="bar-score">${fmtScore(sc)}</span>
      <div class="bar-extra">
        <span class="stars">${st}</span>
        <span class="prices">
          <span class="price-launch" title="首发价">${i.launchPrice?'¥'+i.launchPrice.toLocaleString():'-'}</span>
          <span class="price-retail" title="当前电商价">${priceStr(i.retailPrice)}</span>
        </span>
      </div>
    </div>`;
  }).join('');
}

function selectItem(id){
  const data=getData();
  const item=data.find(d=>d.id===id);
  if(!item)return;
  selectedItem=item;
  document.querySelectorAll('.bar-row').forEach(el=>el.classList.remove('selected'));
  const row=document.querySelector(`[data-id="${CSS.escape(id)}"]`);
  if(row)row.classList.add('selected');
  renderDetail(item);
}

  const panel=document.getElementById('detailPanel');

  const isCpu=currentTab==='cpu';

  let specHtml='';
  if(isCpu){
    specHtml=`
    <div class="spec-item"><div class="sl2">核心/线程</div><div class="sv2">${item.cores}C/${item.threads}T</div></div>
    <div class="spec-item"><div class="sl2">基础/睿频</div><div class="sv2">${item.bClock}${item.bBoost?'/'+item.bBoost:''} GHz</div></div>
    <div class="spec-item"><div class="sl2">缓存</div><div class="sv2">${item.cache}</div></div>

    <div class="spec-item"><div class="sl2">上市年</div><div class="sv2">${item.year}</div></div>`;
  }else{

    <div class="spec-item"><div class="sl2">品牌</div><div class="sv2">${item.brand}</div></div>`;
  }

  panel.innerHTML=`
  <h3>${item.tags?` 🔥 <span style="font-size:10px;color:var(--accent);">${item.tags}</span>`:''}${item.name} <span style="font-size:10px;color:var(--text3);">${item.type==='server'?'服务器':item.type==='laptop'?'笔记本':'桌面'}</span></h3>
  <div class="subtitle">${item.brand} · ${isCpu?item.gen:item.arch} · ${isCpu?item.platform:''}</div>

  <div class="score-grid">
    <div class="score-card">
      <div class="sv">${fmtScore(item.ludashi)}</div>
      <div class="sl">鲁大师 (新版)</div>
    </div>
    <div class="score-card">
      <div class="sv">${item.timespy?item.timespy.toLocaleString():'N/A'}</div>
      <div class="sl">Time Spy ${isCpu?'CPU':'Graphics'}</div>
    </div>
  </div>

  <div class="price-grid">
    <div class="price-card">
      <div class="pv">${item.launchPrice?'¥'+item.launchPrice.toLocaleString():'N/A'}</div>
      <div class="pl">首发价</div>
    </div>
    <div class="price-card">
      <div class="pv">${item.retailPrice?'¥'+item.retailPrice.toLocaleString():'N/A'}</div>
      <div class="pl">当前电商价</div>
    </div>
  </div>

  <div class="score-card" style="text-align:center;">
    <div class="sv ${item.value>=7?'green':item.value>=5?'':'red'}" style="font-size:18px;">${st}</div>
    <div class="sl">性价比指数</div>
  </div>

  <div class="spec-grid">${specHtml}</div>

  <button class="btn-add-compare${inCompare?' added':''}" onclick="toggleCompare('${item.id}')">
    ${inCompare?'✓ 已加入对比 (点击移除)':'+ 加入对比栏'}
  </button>
  `;
}

// === COMPARE ===
function toggleCompare(id){
  const data=getData();
  const item=data.find(d=>d.id===id);
  if(!item)return;
  const idx=compareSlots.indexOf(id);
  if(idx>=0){ compareSlots[idx]=null; }
  else{
    const empty=compareSlots.indexOf(null);
    if(empty>=0) compareSlots[empty]=id;
    else{ alert('对比栏最多4个'); return; }
  }
  renderCompareBar();
  renderBars();
  if(selectedItem&&selectedItem.id===id) renderDetail(selectedItem);
}

function renderCompareBar(){
  document.querySelectorAll('.compare-slot').forEach((slot,i)=>{
    const id=compareSlots[i];
    if(id){
      const item=CPU_DATA.find(d=>d.id===id)||GPU_DATA.find(d=>d.id===id);
      if(item){ slot.textContent=item.name; slot.classList.add('filled'); }
    }else{ slot.textContent='点击/右键加入'; slot.classList.remove('filled'); }
  });
  document.getElementById('compareBtn').disabled=compareSlots.filter(s=>s).length<2;
}

function openCompare(){
  const filled=compareSlots.filter(s=>s);
  if(filled.length<2)return;
  const allData=[...CPU_DATA,...GPU_DATA];
  const items=filled.map(id=>allData.find(d=>d.id===id)).filter(Boolean);
  const isCpu=items.every(i=>'cores' in i);

  let h='<button class="modal-close" onclick="document.getElementById(\'compareModal\').style.display=\'none\'">&times;</button><h2>硬件对比</h2><table><thead><tr><th>参数</th>';
  items.forEach(i=>h+=`<th>${i.name}</th>`);
  h+='</tr></thead><tbody>';

  function row(label,fn,isNum){
    h+=`<tr><td>${label}</td>`;
    const vals=items.map(fn);
    const max=isNum?Math.max(...vals.filter(v=>typeof v==='number'),0):null;
    const min=isNum?Math.min(...vals.filter(v=>typeof v==='number'),Infinity):null;
    items.forEach((i,idx)=>{
      const v=vals[idx];
      let cls='';
      if(isNum&&v!=null&&max!=null&&min!=null&&max!==min){
        if(v===max)cls='best';
        else if(v===min)cls='worst';
      }
      h+=`<td class="${cls}">${typeof v==='number'?v.toLocaleString():v||'-'}</td>`;
    });
    h+='</tr>';
  }

  row('鲁大师跑分',i=>i.ludashi,true);
  row('Time Spy',i=>i.timespy,true);
  row('性价比',i=>stars(i.value));
  row('首发价',i=>i.launchPrice?i.launchPrice.toLocaleString():'-');
  row('电商现价',i=>i.retailPrice?i.retailPrice.toLocaleString():'-');

  if(isCpu){
    row('核心/线程',i=>i.cores+'C/'+i.threads+'T');
    row('基础频率',i=>i.bClock+' GHz');
    row('最大睿频',i=>i.bBoost?i.bBoost+' GHz':'-');
    row('缓存',i=>i.cache);
    row('TDP',i=>i.tdp+'W');
    row('平台',i=>i.platform);
    row('代际',i=>i.gen);
    row('内存',i=>i.ram);
    row('上市年',i=>i.year);
  }else{
    row('显存',i=>i.vram);
    row('架构',i=>i.arch);
    row('流处理器',i=>i.cores,true);
    row('频率',i=>i.bClock+(i.bBoost?'/'+i.bBoost:'')+' MHz');
    row('位宽',i=>i.bus);
    row('TDP',i=>i.tdp+'W');
    row('上市年',i=>i.year);
  }
  h+='</tbody></table>';
  document.getElementById('compareContent').innerHTML=h;
  document.getElementById('compareModal').style.display='flex';
}

// === INIT ===
function getPlatforms(){
  return [...new Set(getData().map(d=>d.platform))].sort();
}

function initPlatforms(){
  const sel=document.getElementById('filterPlatform');
  sel.innerHTML='<option value="all">全部</option>'+getPlatforms().map(p=>`<option value="${p}">${p}</option>`).join('');
}

function switchTab(tab){
  currentTab=tab;
  initPlatforms();
  selectedItem=null;
  document.getElementById('detailPanel').innerHTML='<div class="detail-empty">← 点击硬件查看详情<br><br>右键加入对比栏</div>';
  const br=document.getElementById('filterBrand');
  const tp=document.getElementById('filterType');
  if(tab==='cpu'){
    br.innerHTML='<option value="all">全部</option><option value="Intel">Intel</option><option value="AMD">AMD</option>';
    tp.innerHTML='<option value="all">全部</option><option value="desktop">桌面</option><option value="laptop">笔记本</option><option value="server">服务器</option>';
  }else{
    br.innerHTML='<option value="all">全部</option><option value="NVIDIA">NVIDIA</option><option value="AMD">AMD</option><option value="Intel Arc">Intel Arc</option>';
    tp.innerHTML='<option value="all">全部</option><option value="desktop">桌面</option><option value="laptop">笔记本</option>';
  }
  renderBars();
}

document.addEventListener('DOMContentLoaded',()=>{
  initPlatforms();

  document.querySelectorAll('#tabGroup .tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('#tabGroup .tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      switchTab(btn.dataset.tab);
    });
  });

  document.querySelectorAll('#scoreToggle .score-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('#scoreToggle .score-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentScore=btn.dataset.score;
      renderBars();
      if(selectedItem){
        const data=getData();
        const item=data.find(d=>d.id===selectedItem.id);
        if(item)renderDetail(item);
        else selectedItem=null;
      }
    });
  });

  document.querySelectorAll('#sortGroup .sort-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('#sortGroup .sort-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentSort=btn.dataset.sort;
      renderBars();
      if(selectedItem){ const data=getData(); const item=data.find(d=>d.id===selectedItem.id); if(!item)selectedItem=null; }
    });
  });

  document.getElementById('searchBox').addEventListener('input',renderBars);
  document.getElementById('filterPlatform').addEventListener('change',renderBars);
  document.getElementById('filterBrand').addEventListener('change',renderBars);
  document.getElementById('filterType').addEventListener('change',renderBars);
  document.getElementById('filterValue').addEventListener('change',renderBars);
  document.getElementById('compareBtn').addEventListener('click',openCompare);
  document.getElementById('compareClear').addEventListener('click',()=>{compareSlots=[null,null,null,null];renderCompareBar();renderBars();});
  document.getElementById('compareModal').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});

  document.querySelectorAll('.compare-slot').forEach((slot,i)=>{
    slot.addEventListener('click',()=>{if(compareSlots[i]){compareSlots[i]=null;renderCompareBar();renderBars();}});
  });

  renderBars();
});
</script>
</body>
</html>
